services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: zeta_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    environment:
      APP_URL: http://localhost:${APP_PORT:-8080}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${MYSQL_DATABASE:-zeta}
      DB_USERNAME: ${MYSQL_USER:-zeta}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
    networks:
      - zeta
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/zeta-app-ready"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 180s

  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: zeta_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    environment:
      APP_URL: http://localhost:${APP_PORT:-8080}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${MYSQL_DATABASE:-zeta}
      DB_USERNAME: ${MYSQL_USER:-zeta}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
    networks:
      - zeta
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_healthy
    command: ["queue-worker", "--verbose", "--tries=3"]

  nginx:
    image: nginx:alpine
    container_name: zeta_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - zeta
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: zeta_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zeta}
      MYSQL_USER: ${MYSQL_USER:-zeta}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - zeta
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: zeta_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    networks:
      - zeta
    depends_on:
      mysql:
        condition: service_healthy

networks:
  zeta:
    driver: bridge

volumes:
  mysql_data:
    driver: local
